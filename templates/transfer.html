{% extends "base.html" %}

{% block title %}Transferir Fondos{% endblock %}

{% block content %}
    <h2>Transferir Fondos</h2>
    <form method="POST" action="{{ url_for('transfer_balance') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div>
            <label for="recipient">Usuario destinatario:</label>
            <input type="text" id="recipient" name="recipient" maxlength="80" required>
        </div>
        <div>
            <label for="amount">Cantidad a transferir:</label>
            <input type="number" id="amount" name="amount" min="0.01" max="9999.99" step="0.01" required>
        </div>
        <button type="submit" id="transferBtn">Transferir</button>
    </form>
    <a href="{{ url_for('profile') }}">Volver al Perfil</a>

<script>
document.querySelector('form').addEventListener('submit', function() {
    var btn = document.getElementById('transferBtn');
    btn.disabled = true;
    btn.textContent = 'Procesando...';
});
</script>
{% endblock %}
